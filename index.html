<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavan Kumar V H — AI Engineer & Full Stack Developer</title>
  <meta name="description" content="Portfolio of Pavan Kumar V H — AI Engineer, Full Stack Developer, and Creative Coder building intelligent systems that actually ship." />
  <meta property="og:title" content="Pavan Kumar V H — AI Engineer & Full Stack Developer" />
  <meta property="og:description" content="Building intelligent systems that actually ship. Full-stack developer specializing in AI, RAG, and modern web technologies." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#111111" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Tab Bar -->
    <header id="tab-bar" class="tab-bar">
      <div class="tab-bar__tabs" id="tabs-container"></div>
      <div class="tab-bar__actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="ide-layout">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar__header">
          <span class="sidebar__label">EXPLORER</span>
        </div>
        <div class="sidebar__section">
          <div class="sidebar__folder">
            <span class="sidebar__folder-icon">▼</span>
            <span class="sidebar__folder-name">PORTFOLIO</span>
          </div>
          <nav id="file-tree" class="file-tree"></nav>
        </div>
        <div class="sidebar__profile" id="sidebar-profile"></div>
      </aside>

      <!-- Editor Area -->
      <main class="editor-area">
        <!-- Line Numbers -->
        <div class="line-numbers" id="line-numbers"></div>
        <!-- Content -->
        <div class="editor-content" id="editor-content">
          <div id="page-container"></div>
        </div>
      </main>

      <!-- Info Panel -->
      <aside id="info-panel" class="info-panel">
        <div class="info-panel__content" id="info-panel-content"></div>
      </aside>
    </div>

    <!-- Mobile Bottom Bar -->
    <nav id="mobile-nav" class="mobile-nav">
      <div id="mobile-tabs" class="mobile-nav__tabs"></div>
    </nav>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
